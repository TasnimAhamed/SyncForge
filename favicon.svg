<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Forge Gradient -->
    <linearGradient id="forge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <!-- Sync Gradient -->
    <linearGradient id="sync" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Inner filter for 3D overlap -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)" />

  <g transform="translate(20, 20) scale(0.6)">
    
    <!-- Left Stem (Sync) -->
    <!-- Drawn first so it is underneath -->
    <path d="M 0 100 L 0 25" 
          stroke="url(#sync)" stroke-width="20" stroke-linecap="round" fill="none"/>

    <!-- Middle Bar (Forge) -->
    <!-- Goes from 0 50 to 50 50 -->
    <path d="M 0 50 L 50 50" 
          stroke="url(#forge)" stroke-width="20" stroke-linecap="round" fill="none" filter="url(#shadow)"/>

    <!-- Top Curve & Bar (Forge) -->
    <path d="M 0 25 A 25 25 0 0 1 25 0 L 100 0" 
          stroke="url(#forge)" stroke-width="20" stroke-linecap="round" fill="none" filter="url(#shadow)"/>

    <!-- Bottom S-Curve (Sync) -->
    <!-- Starts at 20 50 (overlapping middle bar) -->
    <path d="M 20 50 L 75 50 A 25 25 0 0 1 75 100 L 25 100 A 25 25 0 0 1 0 75" 
          stroke="url(#sync)" stroke-width="20" stroke-linecap="round" fill="none" filter="url(#shadow)"/>
          
    <!-- Core Spark -->
    <rect x="40" y="65" width="20" height="20" rx="6" transform="rotate(45 50 75)" fill="url(#forge)" filter="url(#shadow)" />
          
  </g>
</svg>
